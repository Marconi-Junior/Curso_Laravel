networks:
  app-network:
    driver: bridge

volumes:
  vol_db:

services:
  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www:cached
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      args:
        WWWUSER: wwwuser
        WWWGROUP: www-data
        WWWUID: 1000
        WWWGID: 1000
    container_name: web
    volumes:
      - .:/var/www:cached
    expose:
      - 9000
    working_dir: /var/www
    networks:
      - app-network
    depends_on:
      - db

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    volumes:
      - vol_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    networks:
      - app-network

  